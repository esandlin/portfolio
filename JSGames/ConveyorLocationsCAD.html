<!doctype html>

<html lang="en" data-theme="light">
    <head>
        <title>Conveyor Locations</title>

        <link rel="stylesheet" href="../styles/ConveyorLocationCAD.css" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body class="conveyor-page">
        <main class="conveyor-app">
            <header class="conveyor-header">
                <div>
                    <h1>Conveyor Locations</h1>
                    <p>Build a real-world layout of conveyors inside a named zone.</p>
                </div>

                <a class="back-link" href="JSGamesMenu.html">← Back to Main Menu</a>
            </header>

            <section class="zone-toolbar">
                <label>
                    Zone Name
                    <input id="zoneNameInput" type="text" placeholder="Example: Zone 1 - Inbound Area - Belt 1" />
                </label>

                <button id="saveZoneBtn" type="button">Save Zone</button>
                <button id="loadZoneBtn" type="button">Load Zone</button>
                <button id="clearZoneBtn" type="button">Clear Zone</button>
                <button id="snapZoneBtn" type="button">Snap Grid: ON</button>
            </section>

            <section class="conveyor-layout">
                <aside class="conveyor-menu">
                    <h2>Conveyor Menu</h2>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="straight-belt"
                        data-label="Straight Belt Conveyor"
                        data-image="../images/conveyors/straight-belt.png">
                        Straight Belt
                    </button>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="roller"
                        data-label="Roller Conveyor"
                        data-image="../images/conveyors/roller-conveyor.png">
                        Roller Conveyor
                    </button>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="curve-45"
                        data-label="45° Curve Conveyor"
                        data-image="../images/conveyors/curve-45.png">
                        45° Curve
                    </button>
                    
                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="curve-90"
                        data-label="90° Curve Conveyor"
                        data-image="../images/conveyors/curve-90.png">
                        90° Curve
                    </button>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="merge"
                        data-label="Merge Conveyor"
                        data-image="../images/conveyors/merge-conveyor.png">
                        Merge
                    </button>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="divert"
                        data-label="Divert Conveyor"
                        data-image="../images/conveyors/divert-conveyor.png">
                        Divert
                    </button>

                    <button
                        class="conveyor-menu-item"
                        data-kind="conveyor"
                        data-type="spiral"
                        data-label="Spiral Conveyor"
                        data-image="../images/conveyors/spiral-conveyor.png">
                        Spiral
                    </button>

                    <hr />

                    <h2>Parts</h2>

                    <div id="conveyorPartsMenuTree" class="conveyor-parts-menu-tree"></div>
                </aside>

                <section class="zone-board-wrap">
                    <div id="zoneBoard" class="zone-board">
                        <p class="zone-board-hint">Drop conveyors here</p>
                    </div>
                </section>

                <aside id="zonePropertiesPanel" class="zone-properties-panel">
                    <h2>Properties</h2>
                    <p id="selectedZoneItemLabel">Select a conveyor or part.</p>

                    <label>
                        Label
                        <input id="selectedItemNameInput" type="text" />
                    </label>

                    <label>
                        Notes
                        <textarea id="selectedItemNotesInput"></textarea>
                    </label>

                    <label>
                        Rotation
                        <input id="selectedItemRotationInput" type="number" step="90" value="0" />
                    </label>

                    <div class="property-button-row">
                        <button id="rotateLeftBtn" type="button">Rotate Left</button>
                        <button id="rotateRightBtn" type="button">Rotate Right</button>
                    </div>

                    <button id="applyZoneItemBtn" type="button">Apply</button>
                    <button id="deleteZoneItemBtn" type="button">Delete</button>
                </aside>
            </section>
        </main>

        <script src="../javaScript/IndustrialPartsCatalog.js"></script>
        <script src="../javaScript/ConveyorLocationsCAD.js"></script>
    </body>
</html>
